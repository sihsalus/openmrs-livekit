[project]
name = "nebu-agent"
version = "2.0.0"
description = "Nebu - LiveKit Voice Agent for interactive learning"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "Flow Telligence"}
]
keywords = ["livekit", "voice-agent", "ai", "tts", "stt"]

dependencies = [
    # LiveKit core
    "livekit-agents~=1.3",

    # Plugins
    "livekit-plugins-openai~=1.3",
    "livekit-plugins-silero~=1.3",
    "livekit-plugins-elevenlabs~=1.3",
    "livekit-plugins-cartesia~=1.3",
    "livekit-plugins-turn-detector~=1.3",
    "livekit-plugins-noise-cancellation~=0.2",

    # Configuration
    "pydantic-settings~=2.0",
    "python-dotenv~=1.0",

    # Logging
    "python-json-logger~=3.0",
    
    # HTTP client
    "aiohttp~=3.9",

    # API REST
    "fastapi~=0.104",
    "uvicorn~=0.24",

    # Error tracking
    "sentry-sdk[fastapi]~=2.0",
]

[project.optional-dependencies]
dev = [
    "pytest~=8.0",
    "pytest-asyncio~=0.23",
    "pytest-cov~=6.0",
    "ruff~=0.5",
    "mypy~=1.10",
]

deepgram = [
    "livekit-plugins-deepgram~=1.1",
]

noise-cancellation = [
    "livekit-plugins-noise-cancellation~=0.2",
]

all = [
    "nebu-agent[dev,deepgram,noise-cancellation]",
]

[project.scripts]
nebu-agent = "src.agent:main"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
