meta:
  sections:
    cosmologia:
      format: "CONOCIMIENTO MESOAMERICANO ({nombre}): {para_ninos} Dato extra: {dato_extra}"
    principio:
      format: "SABIDURIA MESOAMERICANA — {nombre} ({nahuatl}): {para_ninos}"
    deidad:
      format: "PANTEON MESOAMERICANO — {nombre}, {titulo}: {para_ninos}"
    ciencia:
      format: "CIENCIA MESOAMERICANA — {nombre} ({campo}): {para_ninos}"
    mito:
      format: "MITO MESOAMERICANO — {titulo}: {para_ninos}"
  vocab_key: vocabulario
  vocab_chance: 0.4
  vocab_format: "PALABRA NAHUATL: '{palabra}' = {significado}. Enseniasela al ninio si encaja!"

cosmologia:
  - nombre: Los Cinco Soles (Nahui Ollin)
    significado: Las cinco eras del mundo mesoamericano
    descripcion: >-
      Segun la Leyenda de los Soles y la Piedra del Sol, el universo
      ha existido en cinco eras sucesivas. Cada era fue destruida por
      una catastrofe: jaguares, viento, lluvia de fuego y agua.
      Vivimos en el Quinto Sol, Nahui Ollin (4-Movimiento), que sera
      destruido por terremotos. Los dioses se sacrificaron en
      Teotihuacan para crear este sol.
    para_ninos: >-
      Los mexicas creian que el mundo se habia creado y destruido
      CUATRO veces. Primero lo destruyeron los jaguares, luego el
      viento, despues la lluvia de fuego y al final una inundacion.
      Nosotros vivimos en el Quinto Sol. Los dioses tuvieron que
      lanzarse al fuego para que este sol naciera.
    dato_extra: >-
      La Piedra del Sol, de 3.6 metros de diametro y 24 toneladas,
      tiene talladas las cinco eras en su centro. No es un calendario
      sino un monumento cosmologico.

  - nombre: Mictlan
    significado: "El inframundo, region de los muertos"
    descripcion: >-
      El Mictlan tenia nueve niveles que el alma debia atravesar
      durante cuatro anios. Cada nivel presentaba pruebas: cruzar un
      rio con ayuda de un perro xoloitzcuintle, pasar entre montanias
      que chocan, soportar vientos de obsidiana. Al final, el alma
      llegaba ante Mictlantecuhtli y Mictecacihuatl, senores de la
      muerte. Segun Sahagun, no era un lugar de castigo sino el
      destino natural de quienes morian de muerte comun.
    para_ninos: >-
      El Mictlan era el mundo de los muertos, pero NO era un lugar
      malo. Tenia nueve niveles, como un videojuego con nueve mundos.
      El alma viajaba cuatro anios pasando pruebas: cruzar un rio con
      ayuda de un perrito xoloitzcuintle, pasar por montanias que se
      mueven y sobrevivir vientos helados. Al final llegabas con los
      senores del Mictlan.
    dato_extra: >-
      Los xoloitzcuintles eran enterrados con sus duenios porque
      se creia que guiaban al alma a traves del rio Apanohuaia,
      el primer obstaculo del Mictlan.

  - nombre: Tlalocan
    significado: "El paraiso de Tlaloc, dios de la lluvia"
    descripcion: >-
      Segun Sahagun, el Tlalocan era un lugar de abundancia eterna
      donde siempre habia maiz, calabaza, chile, tomate, frijol y
      flores. Iban ahi quienes morian por causas relacionadas con el
      agua: ahogados, fulminados por un rayo o por enfermedades como
      la hidropesia. Era un destino dichoso, no un castigo.
    para_ninos: >-
      El Tlalocan era el paraiso de Tlaloc, el dios de la lluvia.
      Era un jardin verde donde siempre habia comida: maiz,
      calabazas, chiles, tomates. Nunca hacia frio ni calor. Iban
      ahi las personas que morian por causas del agua, como los
      rayos. Era un lugar feliz donde todo florecia.
    dato_extra: >-
      Los murales del Tlalocan en Teotihuacan muestran figuras
      jugando y cantando entre flores y agua, confirmando la vision
      de un paraiso de abundancia.

  - nombre: Omeyocan
    significado: "El lugar de la dualidad, la morada mas alta"
    descripcion: >-
      El decimotercer cielo, morada de Ometeotl, el principio dual
      creador. Segun Leon-Portilla, de ahi emanaba todo lo que
      existe. Era el origen de las fuerzas vitales (tonalli,
      teyolia, ihiyotl) que se enviaban a los recien nacidos.
      Ningun humano podia llegar ahi; era exclusivo del principio
      creador supremo.
    para_ninos: >-
      Omeyocan es el cielo mas alto de todos, el numero trece.
      Ahi vivia Ometeotl, que era hombre y mujer al mismo tiempo.
      Desde ahi mandaba la chispa de vida a cada bebe que nacia
      en la tierra. Era como la fabrica de almas del universo.
    dato_extra: >-
      Los mexicas creian en trece cielos y nueve niveles del
      inframundo, sumando veintidos planos de existencia.

principio:
  - nombre: Dualidad (Ometeotl)
    nahuatl: Ometeotl
    descripcion: >-
      Segun Leon-Portilla, Ometeotl es el principio supremo dual:
      masculino y femenino, luz y oscuridad, vida y muerte.
      Ometecuhtli y Omecihuatl (Senor y Senora de la Dualidad)
      son sus aspectos. Todo lo que existe contiene ambos polos.
      No hay bien sin mal, no hay vida sin muerte.
    para_ninos: >-
      Para los mexicas, todo tiene dos lados que se necesitan.
      Dia y noche, frio y calor, vida y muerte. Su dios mas
      importante, Ometeotl, era hombre Y mujer al mismo tiempo.
      No habia uno sin el otro, como las dos caras de una moneda.

  - nombre: Los dias vacios (Nemontemi)
    nahuatl: Nemontemi
    descripcion: >-
      Los cinco dias finales del calendario solar de 365 dias
      (18 meses de 20 dias = 360 + 5 nemontemi). Segun Sahagun,
      eran dias aciagos en los que no se debia hacer nada
      importante: no trabajar, no discutir, no iniciar proyectos.
      Se consideraban dias sin suerte, un hueco en el tiempo.
    para_ninos: >-
      El calendario mexica tenia 360 dias normales, pero sobraban
      5 dias. Esos dias se llamaban Nemontemi, los dias vacios.
      Nadie trabajaba ni hacia nada importante porque se creia
      que eran dias de mala suerte. Era como si el tiempo se
      detuviera por cinco dias.

  - nombre: El espacio intermedio (Nepantla)
    nahuatl: Nepantla
    descripcion: >-
      Concepto nahuatl que significa 'en medio' o 'entre dos cosas'.
      Leon-Portilla lo describe como el estado de estar entre dos
      mundos, dos culturas, dos realidades. Tras la conquista, los
      pueblos indigenas vivian en nepantla: entre su cosmovision
      y la impuesta. Es un concepto de transicion y mestizaje.
    para_ninos: >-
      Nepantla significa 'estar en medio'. Como cuando estas entre
      dos mundos distintos y no perteneces del todo a ninguno.
      Despues de que llegaron los espanoles, los mexicas se sentian
      en nepantla: entre su cultura y la nueva. Es como estar
      en el puente entre dos paises diferentes.

  - nombre: Fuerza vital (Tonalli)
    nahuatl: Tonalli
    descripcion: >-
      Segun Lopez Austin en 'Cuerpo humano e ideologia', el tonalli
      es una de las tres fuerzas animicas. Se aloja en la cabeza
      y determina el temperamento y el destino de la persona segun
      el dia de su nacimiento. El tonalli podia perderse por susto
      o ser robado por brujos. Los ninos eran especialmente
      vulnerables a perder su tonalli.
    para_ninos: >-
      Los mexicas creian que cada persona nacia con una energia
      especial llamada Tonalli, que vivia en tu cabeza. El dia
      en que nacias determinaba que tipo de tonalli tenias, y eso
      influia en tu personalidad y tu destino. Por eso era
      importantisimo saber tu dia de nacimiento.

deidad:
  - nombre: Quetzalcoatl
    titulo: La Serpiente Emplumada
    descripcion: >-
      Deidad pan-mesoamericana presente desde Teotihuacan. Dios del
      viento (Ehecatl), de la sabiduria, del planeta Venus y creador
      de la humanidad del Quinto Sol. Bajo al Mictlan a recoger los
      huesos de los muertos y los rego con su propia sangre para
      crear a los humanos. Segun Sahagun, sus templos eran redondos
      para que el viento fluyera sin obstaculos.
    para_ninos: >-
      Quetzalcoatl es una serpiente cubierta de plumas de quetzal.
      Era el dios del viento y la sabiduria. Para crear a los
      humanos, hizo algo increible: bajo al mundo de los muertos,
      recogio huesos antiguos y les dio vida con su propia sangre.
      Sus templos eran redondos para que el viento pasara sin chocar.

  - nombre: Tlaloc
    titulo: El que hace brotar las cosas
    descripcion: >-
      Dios de la lluvia, uno de los mas antiguos de Mesoamerica.
      Su culto existe desde Teotihuacan. Tenia cuatro tlaloques
      (ayudantes) que guardaban vasijas con diferentes tipos de
      lluvia: buena, mala, helada y de enfermedad. El Templo Mayor
      de Tenochtitlan tenia dos templos en la cima: uno para
      Tlaloc y otro para Huitzilopochtli.
    para_ninos: >-
      Tlaloc es el dios de la lluvia, con unos ojos como googles
      gigantes y colmillos. Tenia cuatro ayudantes que guardaban
      jarrones con diferentes tipos de lluvia: la lluvia buena
      para las plantas, la lluvia mala, la helada y la que traia
      enfermedades. Su templo estaba en la cima de la piramide
      mas grande de Tenochtitlan.

  - nombre: Huitzilopochtli
    titulo: "Colibri del Sur, dios del sol y la guerra"
    descripcion: >-
      Dios patron de los mexicas. Segun Duran, nacio completamente
      armado de su madre Coatlicue cuando sus hermanos intentaron
      matarla. Derroto a sus 400 hermanos (las estrellas) y a su
      hermana Coyolxauhqui (la luna). Los mexicas creian que el sol
      necesitaba fuerza para renacer cada dia.
    para_ninos: >-
      Huitzilopochtli nacio listo para pelear. Cuando sus 400
      hermanos quisieron lastimar a su mama Coatlicue, el salio
      con armadura y los vencio a todos. Sus hermanos se
      convirtieron en las estrellas y su hermana Coyolxauhqui
      se convirtio en la luna. El es el Sol que les gana cada maniana.

  - nombre: Coatlicue
    titulo: La de la falda de serpientes
    descripcion: >-
      Madre de Huitzilopochtli. Su estatua en el Museo Nacional
      de Antropologia muestra una falda de serpientes entrelazadas,
      un collar de corazones y manos, y dos serpientes como cabeza
      que representan sangre brotando. Segun Lopez Austin,
      representa la tierra en su aspecto devorador y generador:
      la tierra que traga a los muertos y da vida a los nuevos seres.
    para_ninos: >-
      Coatlicue es la mama de Huitzilopochtli. Su nombre significa
      'la de la falda de serpientes' porque su vestido estaba hecho
      de serpientes entrelazadas. Su estatua es famosa en todo el
      mundo. Ella representa la tierra que da vida y la recibe
      de vuelta, como un ciclo que nunca termina.

  - nombre: Tezcatlipoca
    titulo: El Espejo Humeante
    descripcion: >-
      Dios de la noche, la memoria y el destino. Su nombre significa
      'espejo que humea'. Segun Sahagun, tenia un espejo de obsidiana
      en el pie (que perdio luchando contra el monstruo de la tierra)
      donde podia ver todo lo que pasaba en el mundo. Era el rival
      cosmico de Quetzalcoatl. Omnipresente e invisible como el viento
      nocturno.
    para_ninos: >-
      Tezcatlipoca tenia un espejo magico hecho de obsidiana donde
      podia ver TODO lo que pasaba en el mundo. Su nombre significa
      'espejo que humea'. Era el dios de la noche y el rival de
      Quetzalcoatl. Perdio un pie peleando contra un monstruo
      gigante y en su lugar puso el espejo magico.

  - nombre: Xochiquetzal
    titulo: Flor Preciosa de Quetzal
    descripcion: >-
      Diosa de las flores, la belleza, el amor y las artes. Segun
      Sahagun, era patrona de los artesanos, tejedores, pintores y
      orfebres. Vivia en el Tamoanchan, un paraiso florido. Se la
      representaba siempre joven, adornada con flores y plumas de
      quetzal. Protectora de las madres jovenes.
    para_ninos: >-
      Xochiquetzal era la diosa de las flores y la belleza. Vivia
      en un jardin magico lleno de flores, mariposas y pajaros.
      Ella protegia a los artistas: pintores, tejedores y
      escultores. Siempre se la pintaba joven y bonita, con flores
      en el pelo y plumas de quetzal.

  - nombre: Tonatiuh
    titulo: "El Sol, el Quinto Sol"
    descripcion: >-
      Dios sol del Quinto Sol. Segun la Leyenda de los Soles, el
      dios Nanahuatzin se lanzo al fuego en Teotihuacan y se
      convirtio en Tonatiuh. Pero el sol no se movia hasta que
      todos los dioses se sacrificaron tambien. Esta en el centro
      de la Piedra del Sol con sus garras agarrando corazones,
      simbolizando su necesidad de energia.
    para_ninos: >-
      Tonatiuh es el Sol. Nacio cuando un dios humilde llamado
      Nanahuatzin se atrevio a lanzarse al fuego. Un dios rico
      tuvo miedo, pero Nanahuatzin fue valiente y se convirtio
      en el Sol. La cara de Tonatiuh esta en el centro de la
      famosa Piedra del Sol.

  - nombre: Mictlantecuhtli
    titulo: "Senor del Mictlan, senor de los muertos"
    descripcion: >-
      Dios de la muerte y senor del inframundo. Se le representaba
      como un esqueleto o con un craneo descarnado, con ojos
      estelares y adornos de buhos y aranias. Segun Sahagun, no
      era malvado: simplemente recibia a todos los muertos de
      muerte natural. Intento impedir que Quetzalcoatl se llevara
      los huesos de los muertos para crear humanos.
    para_ninos: >-
      Mictlantecuhtli es el senor de los muertos, pero no es
      malo. Era como el guardian del lugar donde iban las personas
      que morian. Parecia un esqueleto con ojos de estrellas.
      Cuando Quetzalcoatl quiso llevarse huesos para crear
      humanos, Mictlantecuhtli le puso trampas y pruebas.

  - nombre: Coyolxauhqui
    titulo: La de los cascabeles en las mejillas
    descripcion: >-
      Diosa lunar, hermana de Huitzilopochtli. Segun Duran, guio
      a sus 400 hermanos (los Centzon Huitznahua) para matar a su
      madre Coatlicue. Huitzilopochtli la derroto y la desmembro,
      arrojando su cabeza al cielo donde se convirtio en la Luna.
      El monolito circular de Coyolxauhqui desmembrada se encontro
      al pie del Templo Mayor en 1978.
    para_ninos: >-
      Coyolxauhqui es la Luna. Su nombre significa 'la de los
      cascabeles en las mejillas'. Quiso pelear contra su mama,
      pero su hermano Huitzilopochtli la vencio y la lanzo al
      cielo, donde se convirtio en la Luna. En 1978 encontraron
      una piedra enorme con su imagen debajo de la Ciudad de Mexico.

ciencia:
  - nombre: El cero maya
    campo: Matematicas
    descripcion: >-
      Los mayas inventaron el concepto de cero de forma independiente,
      siglos antes de que llegara de la India a Europa. Lo
      representaban como una concha de caracol o una flor. Usaban un
      sistema vigesimal (base 20) posicional. Este cero no era solo
      un marcador de posicion sino un numero con valor propio, lo que
      les permitia hacer calculos astronomicos de gran precision.
    para_ninos: >-
      Los mayas inventaron el CERO, esa idea de la 'nada' que es
      tan importante en matematicas. Lo dibujaban como una conchita
      de caracol. Mientras en Europa todavia no sabian que el cero
      existia, los mayas ya lo usaban para calcular las orbitas de
      los planetas. Contaban de 20 en 20, no de 10 en 10 como nosotros.

  - nombre: Calendario de la Piedra del Sol
    campo: Astronomia y cronologia
    descripcion: >-
      Los mexicas usaban dos calendarios simultaneos: el Tonalpohualli
      (ciclo ritual de 260 dias, con 20 trecenas) y el Xiuhpohualli
      (calendario solar de 365 dias, con 18 meses de 20 dias + 5
      nemontemi). Ambos ciclos se sincronizaban cada 52 anios en la
      ceremonia del Fuego Nuevo. La Piedra del Sol registra la
      cosmologia de los Cinco Soles, no es propiamente un calendario.
    para_ninos: >-
      Los mexicas tenian DOS calendarios al mismo tiempo. Uno de 260
      dias para las ceremonias y otro de 365 dias para la agricultura.
      Cada 52 anios los dos coincidian y hacian una fiesta enorme
      donde apagaban todos los fuegos y encendian uno nuevo. La
      famosa Piedra del Sol pesa 24 toneladas y cuenta la historia
      de las cinco eras del mundo.

  - nombre: Chinampas (jardines flotantes)
    campo: Agricultura e ingenieria
    descripcion: >-
      Sistema de agricultura intensiva en los lagos del Valle de
      Mexico. Las chinampas eran islas artificiales construidas con
      capas de vegetacion acuatica, lodo y tierra, fijadas al fondo
      del lago con estacas de ahuejote (sauce). Podian producir
      hasta siete cosechas al anio. Alimentaron a una ciudad de
      mas de 200,000 habitantes. Todavia se usan en Xochimilco.
    para_ninos: >-
      Los mexicas construian jardines FLOTANTES en el lago. Se
      llamaban chinampas y eran islas hechas a mano con plantas
      del lago, lodo y tierra. Ahi sembraban maiz, frijol,
      calabaza, flores y chiles. Podian cosechar hasta SIETE
      veces al anio. Todavia existen en Xochimilco, en la Ciudad
      de Mexico.

  - nombre: Vulcanizacion del caucho (hule)
    campo: Quimica y tecnologia
    descripcion: >-
      Los olmecas (hacia 1600 a.C.) descubrieron como mezclar
      latex del arbol de hule (Castilla elastica) con jugo de
      una enredadera (Ipomoea alba) para crear caucho procesado.
      Con esto fabricaban pelotas para el juego de pelota,
      sandalias impermeables y bandas elasticas. Este proceso de
      vulcanizacion fue 3,500 anios anterior al 'descubrimiento'
      de Charles Goodyear en 1839.
    para_ninos: >-
      Los olmecas inventaron el HULE hace mas de 3,500 anios.
      Mezclaban el jugo blanco del arbol de hule con el jugo de
      una planta trepadora, y el liquido se convertia en una pelota
      que rebotaba. Con eso hacian las pelotas para el juego de
      pelota, que era el deporte mas importante de Mesoamerica.
      Un senor llamado Goodyear 'descubrio' lo mismo 3,500 anios despues.

  - nombre: Astronomia maya
    campo: Astronomia
    descripcion: >-
      Los mayas calcularon el anio solar en 365.2420 dias (el valor
      real es 365.2422). Calcularon el ciclo de Venus en 583.92 dias
      (el valor real es 583.93). El Codigo de Dresde contiene tablas
      de eclipses con precision de minutos. Lograron esto sin
      telescopios, usando solo observacion a simple vista desde
      edificios como el Caracol de Chichen Itza.
    para_ninos: >-
      Los mayas calcularon cuanto dura un anio con un error de
      solo 17 SEGUNDOS, sin telescopios ni computadoras. Solo
      mirando el cielo desde sus piramides. Tambien sabian
      exactamente cuando iba a pasar Venus por el cielo y cuando
      habria eclipses. Escribieron todo en libros de corteza de
      arbol llamados codices.

  - nombre: Odontologia y deformacion craneal
    campo: Medicina y estetica corporal
    descripcion: >-
      Los mayas practicaban incrustaciones dentales de jade,
      pirita y obsidiana usando un adhesivo de resinas vegetales
      que duraba siglos. Tambien limaban los dientes en formas
      decorativas. La deformacion craneal intencional se lograba
      con tablillas en los primeros meses de vida, como signo de
      estatus. Los dentistas mayas usaban taladros de jade y polvo
      abrasivo. Segun estudios arqueologicos, las incrustaciones
      rara vez causaban infecciones.
    para_ninos: >-
      Los mayas eran los dentistas mas avanzados de su epoca.
      Les poniam piedritas de JADE en los dientes como decoracion,
      usando un pegamento especial hecho de plantas que duraba
      cientos de anios. Tambien limaban los dientes en formas
      bonitas. Y algo curioso: les daban forma especial a la
      cabeza de los bebes como signo de importancia.

mito:
  - titulo: El nacimiento de Huitzilopochtli
    relato: >-
      Segun Sahagun y Duran, Coatlicue barria en el cerro de
      Coatepec cuando una bola de plumas cayo del cielo y la
      embarazo. Sus hijos, los Centzon Huitznahua (400 guerreros
      estelares), guiados por Coyolxauhqui, decidieron matarla
      por la deshonra. Pero Huitzilopochtli nacio completamente
      armado con la Xiuhcoatl (serpiente de fuego), derroto a los
      400 y desmembro a Coyolxauhqui, cuyo cuerpo rodo cerro abajo.
      Este mito explica el ciclo diario: el Sol (Huitzilopochtli)
      vence a la Luna (Coyolxauhqui) y a las estrellas cada amanecer.
    para_ninos: >-
      La mama de Huitzilopochtli estaba barriendo cuando una plumita
      magica cayo del cielo. Sus otros hijos se enojaron mucho y
      quisieron atacarla, pero Huitzilopochtli nacio de repente
      con una armadura increible y una serpiente de fuego. Vencio
      a sus 400 hermanos (que son las estrellas) y a su hermana
      Coyolxauhqui (que es la Luna). Por eso cada maniana el Sol
      le gana a las estrellas y a la Luna.

  - titulo: El viaje de Quetzalcoatl al Mictlan
    relato: >-
      Segun la Leyenda de los Soles, para crear a los humanos del
      Quinto Sol, Quetzalcoatl bajo al Mictlan a pedir los huesos
      preciosos de los muertos a Mictlantecuhtli. El senor de los
      muertos acepto, pero le puso pruebas imposibles: tocar una
      trompeta hecha de caracol sin agujeros. Quetzalcoatl llamo
      a los gusanos para que la perforaran y a las abejas para que
      sonaran dentro. Mictlantecuhtli enfurecio y abrio un hoyo
      donde Quetzalcoatl cayo y rompio los huesos. Por eso los
      humanos tienen diferentes tamanos. Quetzalcoatl los llevo a
      Tamoanchan y los rego con su sangre para darles vida.
    para_ninos: >-
      Para crear a las personas, Quetzalcoatl tuvo que bajar al
      mundo de los muertos. El senor de ahi, Mictlantecuhtli, le
      dijo: 'Solo te los doy si tocas esta trompeta de caracol.'
      Pero la trompeta no tenia hoyos. Quetzalcoatl llamo a los
      gusanos para hacerle agujeros y a las abejas para que zumbaran
      adentro. Cuando se escapo con los huesos, se tropezo y los
      rompio. Por eso hay personas altas y bajitas. Les echo su
      propia sangre y asi nacimos los humanos.

  - titulo: La fundacion de Tenochtitlan (el aguila sobre el nopal)
    relato: >-
      Segun Duran y la Tira de la Peregrinacion, los mexicas
      salieron de Aztlan guiados por Huitzilopochtli en una
      peregrinacion de mas de 200 anios. El dios les dijo que
      fundarian su ciudad donde encontraran un aguila posada
      sobre un nopal devorando una serpiente. Tras siglos de
      errar y ser rechazados, en 1325 encontraron la senal en
      un islote del lago de Texcoco. Ahi fundaron Mexico-Tenochtitlan,
      que en 200 anios se convirtio en la ciudad
      mas grande de America con mas de 200,000 habitantes.
    para_ninos: >-
      Los mexicas viajaron durante mas de 200 anios buscando
      un lugar para vivir. Su dios Huitzilopochtli les prometio:
      'Sabran donde es cuando vean un aguila parada en un nopal
      comiendose una serpiente.' Nadie los queria y los corrian
      de todos lados. Hasta que un dia, en una isla en medio de
      un lago, vieron la senal. Ahi construyeron Tenochtitlan,
      que se convirtio en una ciudad enorme. Esa imagen del aguila
      esta hoy en la bandera de Mexico.

