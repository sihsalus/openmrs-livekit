# [TU_MODULO].yaml — Conocimiento cultural de [TU CULTURA] para Nebu.
#
# Cada sección contiene datos REALES y verificables.
# Citar fuentes académicas en este comentario.
#
# Fuentes:
# - [AGREGAR FUENTES ACADÉMICAS AQUÍ]

# ── Meta ──────────────────────────────────────────────────────────────
# Configuración del builder: secciones con sus format strings.
meta:
  sections:
    historia:
      format: "CONOCIMIENTO [TU CULTURA] ({nombre}, {periodo}): {para_ninos} Dato extra: {dato_extra}"
    filosofia:
      format: "SABIDURÍA [TU CULTURA] — {nombre} ({termino_original}): {para_ninos}"
    figura:
      format: "FIGURA [TU CULTURA] — {nombre}, {titulo}: {para_ninos}"
    innovacion:
      format: "INNOVACIÓN [TU CULTURA] — {nombre} ({campo}): {para_ninos}"
    tradicion:
      format: "TRADICIÓN [TU CULTURA] — {titulo}: {para_ninos}"
  vocab_key: vocabulario
  vocab_chance: 0.4
  vocab_format: "PALABRA [TU CULTURA]: '{palabra}' = {significado}. ¡Enséñasela al niño si encaja!"

# ── Historia ──────────────────────────────────────────────────────────
# 3-5 eventos históricos clave.
historia:
  - nombre: "Evento histórico 1"
    periodo: "Siglo X — Siglo Y"
    descripcion: >-
      Descripción académica detallada del evento.
      Contexto histórico, causas y consecuencias.
    para_ninos: >-
      Versión para niños: lenguaje simple, entusiasta,
      máximo 3-4 oraciones. ¡Que enganche!
    dato_extra: >-
      Dato adicional sorprendente que no repita lo de para_ninos.

# ── Filosofía / Conceptos ────────────────────────────────────────────
# 3-5 ideas culturales profundas.
filosofia:
  - nombre: "Concepto 1"
    termino_original: "Palabra en idioma original"
    descripcion: >-
      Descripción académica del concepto filosófico o cultural.
    para_ninos: >-
      Versión para niños del concepto.

# ── Figuras culturales ───────────────────────────────────────────────
# 3-5 figuras históricas y contemporáneas.
figura:
  - nombre: "Persona famosa"
    titulo: "Descripción corta (ej: 'El inventor del X')"
    descripcion: >-
      Descripción académica de la figura.
    para_ninos: >-
      Versión para niños.

# ── Innovaciones / Logros ────────────────────────────────────────────
# 3-5 innovaciones verificables.
innovacion:
  - nombre: "Innovación 1"
    campo: "Área (ej: Tecnología, Agricultura, Arte)"
    descripcion: >-
      Descripción académica de la innovación.
    para_ninos: >-
      Versión para niños.

# ── Tradiciones ──────────────────────────────────────────────────────
# 3-5 festividades y costumbres.
tradicion:
  - titulo: "Tradición 1"
    descripcion: >-
      Descripción académica de la tradición.
    para_ninos: >-
      Versión para niños.

# ── Vocabulario ──────────────────────────────────────────────────────
# 8-15 palabras del idioma/jerga de tu cultura.
vocabulario:
  - palabra: "Palabra en idioma original"
    significado: "Traducción / significado"
    uso: "Contexto de uso para Nebu (cuándo y cómo usarla)"
